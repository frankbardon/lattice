<!DOCTYPE html>
<html lang="en" data-theme="lattice">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>lattice dashboard {{DASHBOARD_ID}}</title>

  <!-- v1: pull the frontend stack from CDN (Tailwind+DaisyUI, AlpineJS,
       centrifuge-js). Noted in FOLLOWUPS as a vendoring candidate. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://unpkg.com/centrifuge@5.4.0/dist/centrifuge.js"></script>
  <script>
    // fast-json-patch (RFC6902) — apply patches broadcast by the server to the
    // local view document. The thin client never computes board state itself;
    // it only replays the authoritative patch stream.
    window.LATTICE_JSONPATCH_SRC = "https://cdn.jsdelivr.net/npm/fast-json-patch@3.1.1/dist/fast-json-patch.min.js";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/fast-json-patch@3.1.1/dist/fast-json-patch.min.js"></script>

  <style>
    /* The board is a fixed-column masonry grid. Bricks flow into columns; a
       brick's layout.size.width spans grid columns and layout.size.height sets
       a row span unit. layout.pos.y drives ordering (column-flow masonry), and
       layout.pos.x is advisory in v1 (see FOLLOWUPS). */
    [x-cloak] { display: none !important; }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 12), minmax(0, 1fr));
      grid-auto-rows: 40px;
      grid-auto-flow: row dense;
      gap: 0.75rem;
    }
    .brick-slot { overflow: auto; }
    .brick-slot svg { max-width: 100%; height: auto; }
  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div
    x-data="board()"
    x-init="init()"
    x-cloak
    class="max-w-screen-2xl mx-auto p-4"
  >
    <!-- Header / toolbar -->
    <header class="navbar bg-base-100 rounded-box shadow mb-4 px-4">
      <div class="flex-1 gap-2 items-center">
        <h1 class="text-lg font-semibold" x-text="doc.name || ('board ' + dashboardId)"></h1>
        <span class="badge" :class="statusClass" x-text="status"></span>
        <span class="badge badge-info" x-text="'viewers: ' + viewers"></span>
      </div>
      <div class="flex-none gap-2">
        <button class="btn btn-sm btn-primary" @click="addBrick('markdown')" :disabled="status !== 'connected'">
          + Markdown
        </button>
        <button class="btn btn-sm btn-secondary" @click="addBrick('pulse_prism')" :disabled="status !== 'connected'">
          + Pulse/Prism
        </button>
        <button class="btn btn-sm btn-ghost" @click="showVars = !showVars">
          <span x-text="showVars ? 'Hide variables' : 'Variables'"></span>
          <span class="badge badge-sm" x-text="doc.variables.length"></span>
        </button>
        <button class="btn btn-sm btn-ghost" @click="showLog = !showLog">
          <span x-text="showLog ? 'Hide log' : 'Show log'"></span>
        </button>
      </div>
    </header>

    <!-- Variables panel. Board-level parameters that brick templates reference
         via ${name} (resolved server-side at render — E3-S2; this panel only
         defines/edits/removes them). Every change flows through the same
         intent → RFC6902 patch → broadcast path as bricks: defining or removing
         a variable, or editing a value, emits an intent and the authoritative
         patch updates doc.variables for every connected browser. -->
    <section class="bg-base-100 rounded-box shadow mb-4 p-4" x-show="showVars">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold">Variables</h2>
        <span class="text-xs text-base-content/50">
          Referenced in templates as <code class="font-mono">${name}</code>
        </span>
      </div>

      <!-- Existing definitions: edit current value (typed input per kind) or
           remove. Name/type/default are fixed once defined; redefine to change
           the shape (define_variable replaces by name). -->
      <template x-if="doc.variables.length === 0">
        <p class="text-base-content/50 text-sm">No variables defined yet.</p>
      </template>
      <div class="overflow-x-auto" x-show="doc.variables.length > 0">
        <table class="table table-sm">
          <thead>
            <tr>
              <th>Name</th><th>Type</th><th>Default</th><th>Value</th><th></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="v in doc.variables" :key="v.name">
              <tr>
                <td class="font-mono" x-text="v.name"></td>
                <td><span class="badge badge-sm badge-outline" x-text="v.type"></span></td>
                <td class="font-mono text-xs text-base-content/60" x-text="v.default"></td>
                <td>
                  <!-- enum: select among options -->
                  <template x-if="v.type === 'enum'">
                    <select
                      class="select select-bordered select-sm w-full max-w-xs"
                      :value="v.value"
                      @change="setVariable(v.name, $event.target.value)"
                      :disabled="status !== 'connected'"
                    >
                      <template x-for="opt in (v.options || [])" :key="opt">
                        <option :value="opt" :selected="opt === v.value" x-text="opt"></option>
                      </template>
                    </select>
                  </template>
                  <!-- number / string: typed text input, committed on change -->
                  <template x-if="v.type !== 'enum'">
                    <input
                      :type="v.type === 'number' ? 'number' : 'text'"
                      class="input input-bordered input-sm w-full max-w-xs"
                      :value="v.value"
                      @change="setVariable(v.name, $event.target.value)"
                      :disabled="status !== 'connected'"
                    />
                  </template>
                </td>
                <td>
                  <button
                    class="btn btn-xs btn-error btn-outline"
                    title="Remove variable"
                    @click="removeVariable(v.name)"
                    :disabled="status !== 'connected'"
                  >✕</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Add a new definition. Emits define_variable; enum requires a
           comma-separated options list. Client-side checks mirror the server's
           minimal validation (number parses; enum value in options) so the
           common rejection is caught before the round-trip, but the server is
           authoritative — a rejected intent surfaces in newVar.error. -->
      <div class="divider my-2"></div>
      <form class="flex flex-wrap items-end gap-2" @submit.prevent="addVariable()">
        <div>
          <label class="label py-0"><span class="label-text text-xs">Name</span></label>
          <input class="input input-bordered input-sm w-36" x-model="newVar.name" placeholder="region" />
        </div>
        <div>
          <label class="label py-0"><span class="label-text text-xs">Type</span></label>
          <select class="select select-bordered select-sm" x-model="newVar.type">
            <option value="string">string</option>
            <option value="number">number</option>
            <option value="enum">enum</option>
          </select>
        </div>
        <div x-show="newVar.type === 'enum'">
          <label class="label py-0"><span class="label-text text-xs">Options (comma-sep)</span></label>
          <input class="input input-bordered input-sm w-48" x-model="newVar.options" placeholder="us, eu, ap" />
        </div>
        <div>
          <label class="label py-0"><span class="label-text text-xs">Default</span></label>
          <input
            :type="newVar.type === 'number' ? 'number' : 'text'"
            class="input input-bordered input-sm w-36"
            x-model="newVar.default"
          />
        </div>
        <button class="btn btn-sm btn-primary" type="submit" :disabled="status !== 'connected'">Add variable</button>
        <span class="text-error text-xs" x-text="newVar.error"></span>
      </form>
    </section>

    <!-- Empty state -->
    <template x-if="doc.bricks.length === 0">
      <div class="hero bg-base-100 rounded-box py-16">
        <div class="hero-content text-center">
          <div>
            <p class="text-base-content/60">No bricks yet.</p>
            <div class="flex gap-2 justify-center mt-3">
              <button class="btn btn-primary" @click="addBrick('markdown')" :disabled="status !== 'connected'">
                Add markdown brick
              </button>
              <button class="btn btn-secondary" @click="addBrick('pulse_prism')" :disabled="status !== 'connected'">
                Add pulse_prism brick
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Masonry board -->
    <div class="board-grid" :style="`--cols: ${cols}`">
      <template x-for="brick in orderedBricks()" :key="brick.id">
        <div
          class="card bg-base-100 shadow border border-base-300"
          :style="brickStyle(brick)"
          :data-brick-id="brick.id"
        >
          <div class="card-body p-3 gap-2">
            <!-- Brick chrome / controls -->
            <div class="flex items-center justify-between gap-2">
              <div class="flex items-center gap-2 min-w-0">
                <span class="badge badge-sm badge-outline" x-text="brick.kind"></span>
                <span class="text-xs text-base-content/50 truncate" x-text="brick.id"></span>
              </div>
              <div class="flex items-center gap-1">
                <button class="btn btn-xs btn-ghost" title="AI build (chat)" @click="openChat(brick)">✨</button>
                <button class="btn btn-xs btn-ghost" title="Edit template" @click="openEditor(brick)">✎</button>
                <button class="btn btn-xs btn-ghost" title="Move up" @click="moveBrick(brick, 0, -1)">↑</button>
                <button class="btn btn-xs btn-ghost" title="Move down" @click="moveBrick(brick, 0, 1)">↓</button>
                <button class="btn btn-xs btn-ghost" title="Narrower" @click="resizeBrick(brick, -1, 0)">－w</button>
                <button class="btn btn-xs btn-ghost" title="Wider" @click="resizeBrick(brick, 1, 0)">＋w</button>
                <button class="btn btn-xs btn-ghost" title="Shorter" @click="resizeBrick(brick, 0, -1)">－h</button>
                <button class="btn btn-xs btn-ghost" title="Taller" @click="resizeBrick(brick, 0, 1)">＋h</button>
                <button class="btn btn-xs btn-error btn-outline" title="Delete" @click="deleteBrick(brick)">✕</button>
              </div>
            </div>

            <!-- Server render error for this brick (from the `rendered` topic
                 with an error set). A bad hand-edited template surfaces here
                 instead of crashing the board; the last good fragment stays put. -->
            <template x-if="renderErrors[brick.id]">
              <div class="alert alert-error text-xs p-2 mb-1" role="alert">
                <div class="min-w-0">
                  <span class="font-mono opacity-70" x-text="renderErrors[brick.id].code"></span>
                  <span class="block break-words" x-text="renderErrors[brick.id].message"></span>
                </div>
              </div>
            </template>

            <!-- Rendered fragment SLOT. Server-rendered HTML/SVG is injected
                 here via the `rendered` topic. The client NEVER computes brick
                 content. -->
            <div class="brick-slot flex-1" x-html="fragments[brick.id] || placeholder(brick)"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Brick template editor. A DaisyUI modal that edits the targeted brick's
         template and emits edit_template on save. Generic over brick.kind: a
         pulse_prism brick gets two JSON textareas (pulse_request + prism_spec)
         with inline JSON.parse validation; every other kind (markdown today)
         gets a single plain-text textarea. The server is authoritative — save
         only emits the intent; the chart/HTML arrives back on the rendered
         topic, and a bad template comes back as a typed render error shown
         inline (editor.serverError) without crashing the board. -->
    <div class="modal" :class="{ 'modal-open': editor.open }" role="dialog">
      <div class="modal-box max-w-3xl">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg">
            Edit template
            <span class="badge badge-outline ml-1" x-text="editor.kind"></span>
          </h3>
          <span class="text-xs text-base-content/50 font-mono" x-text="editor.brickId"></span>
        </div>

        <!-- pulse_prism: structured JSON editor (Pulse request + Prism spec) -->
        <template x-if="editor.kind === 'pulse_prism'">
          <div class="flex flex-col gap-3">
            <div>
              <label class="label py-1">
                <span class="label-text font-medium">Pulse request (JSON)</span>
                <span class="label-text-alt text-error" x-text="editor.errors.pulse"></span>
              </label>
              <textarea
                class="textarea textarea-bordered font-mono text-xs w-full h-40"
                :class="{ 'textarea-error': editor.errors.pulse }"
                x-model="editor.pulse"
                @input="validateEditor()"
                spellcheck="false"
              ></textarea>
            </div>
            <div>
              <label class="label py-1">
                <span class="label-text font-medium">Prism spec (JSON)</span>
                <span class="label-text-alt text-error" x-text="editor.errors.prism"></span>
              </label>
              <textarea
                class="textarea textarea-bordered font-mono text-xs w-full h-40"
                :class="{ 'textarea-error': editor.errors.prism }"
                x-model="editor.prism"
                @input="validateEditor()"
                spellcheck="false"
              ></textarea>
            </div>
            <div class="text-xs text-base-content/60 leading-relaxed">
              Tip: aggregated Pulse columns are named
              <code class="font-mono">AGG_&lt;TYPE&gt;_&lt;field&gt;</code>
              (e.g. <code class="font-mono">AGG_SUM_amount</code>) unless you set a
              <code class="font-mono">label</code> on the aggregation — then the column
              uses that label. Reference those exact names in the Prism spec's
              <code class="font-mono">encoding</code> fields. The spec's data is
              replaced with the Pulse result server-side, so any inline data is ignored.
            </div>
          </div>
        </template>

        <!-- everything else (markdown): a plain-text editor, not JSON. -->
        <template x-if="editor.kind !== 'pulse_prism'">
          <div>
            <label class="label py-1">
              <span class="label-text font-medium" x-text="editor.kind + ' template'"></span>
            </label>
            <textarea
              class="textarea textarea-bordered font-mono text-xs w-full h-64"
              x-model="editor.text"
              spellcheck="false"
            ></textarea>
          </div>
        </template>

        <!-- Server-side render error, slotted from the rendered topic after save.
             The intent itself succeeds (template is just stored); a bad template
             only fails at render, and that typed error lands here. -->
        <template x-if="editor.serverError">
          <div class="alert alert-error mt-3 text-sm" role="alert">
            <div class="min-w-0">
              <span class="font-mono opacity-70" x-text="editor.serverError.code"></span>
              <span class="block break-words" x-text="editor.serverError.message"></span>
            </div>
          </div>
        </template>

        <div class="modal-action">
          <button class="btn btn-ghost" @click="closeEditor()">Cancel</button>
          <button
            class="btn btn-primary"
            @click="saveEditor()"
            :disabled="!editorValid()"
          >Save</button>
        </div>
      </div>
      <div class="modal-backdrop" @click="closeEditor()"></div>
    </div>

    <!-- Per-brick "AI build" chat panel. A DaisyUI modal scoped to ONE brick's
         builder agent (its agent_id). Each message routes to that brick's agent
         via the brick_chat RPC (E4-S2): the server drives the agent, validates
         the parameterized {pulse_request, prism_spec} template it emits, applies
         it as edit_template, and replies with the applied patch + canonical
         template. The chart updates for EVERY browser via the same `rendered`
         topic a hand edit uses (see applyRendered) — the panel does not render
         the chart itself; it only drives the conversation and reflects the
         outcome. The server surfaces only a FINAL reply (no incremental token /
         tool-call stream), so the panel shows a generic "working…" thinking
         state, then the agent's confirmation (the template that was built) or a
         typed error. Conversation history is kept PER brick_id in chats[]. -->
    <div class="modal" :class="{ 'modal-open': chat.open }" role="dialog">
      <div class="modal-box max-w-2xl flex flex-col" style="max-height: 85vh;">
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-lg">
            AI build
            <span class="badge badge-outline ml-1" x-text="chatBrickKind()"></span>
          </h3>
          <span class="text-xs text-base-content/50 font-mono" x-text="chat.brickId"></span>
        </div>

        <p class="text-xs text-base-content/60 mb-2 leading-relaxed">
          Describe the chart you want. The brick's agent inspects your data and
          builds a parameterized template; the chart updates live for everyone.
        </p>

        <!-- Conversation transcript (DaisyUI chat bubbles). Empty until the
             first message. user → chat-end; agent/system → chat-start. -->
        <div class="flex-1 overflow-y-auto bg-base-200 rounded-box p-3 mb-2 min-h-32" x-ref="chatLog">
          <template x-if="chatMessages().length === 0">
            <p class="text-base-content/40 text-sm italic text-center py-6">
              No messages yet. Ask the agent to build this brick.
            </p>
          </template>
          <template x-for="(m, i) in chatMessages()" :key="i">
            <div class="chat" :class="m.role === 'user' ? 'chat-end' : 'chat-start'">
              <div
                class="chat-bubble text-sm whitespace-pre-wrap break-words"
                :class="m.role === 'user' ? 'chat-bubble-primary'
                  : (m.role === 'error' ? 'chat-bubble-error' : 'chat-bubble-secondary')"
                x-text="m.text"
              ></div>
              <template x-if="m.template">
                <div class="chat-footer opacity-60 mt-1">
                  <button class="link link-hover text-xs" @click="m.show = !m.show">
                    <span x-text="m.show ? 'hide built template' : 'show built template'"></span>
                  </button>
                  <pre
                    x-show="m.show"
                    class="bg-base-300 rounded p-2 mt-1 text-xs overflow-x-auto max-w-md"
                    x-text="m.template"
                  ></pre>
                </div>
              </template>
            </div>
          </template>

          <!-- In-flight "thinking" indicator. The server exposes no incremental
               agent io, so this is a single generic working state until the RPC
               reply lands. -->
          <template x-if="chatPending()">
            <div class="chat chat-start">
              <div class="chat-bubble chat-bubble-secondary text-sm flex items-center gap-2">
                <span class="loading loading-dots loading-sm"></span>
                <span>working…</span>
              </div>
            </div>
          </template>
        </div>

        <!-- Composer -->
        <form class="flex items-end gap-2" @submit.prevent="sendChat()">
          <textarea
            class="textarea textarea-bordered flex-1 text-sm h-16"
            x-model="chat.draft"
            placeholder="e.g. show total amount by region as a bar chart"
            :disabled="chatPending() || status !== 'connected'"
            @keydown.enter.prevent="sendChat()"
          ></textarea>
          <button
            class="btn btn-primary"
            type="submit"
            :disabled="chatPending() || status !== 'connected' || !chat.draft.trim()"
          >Send</button>
        </form>

        <div class="modal-action mt-2">
          <button class="btn btn-ghost btn-sm" @click="closeChat()">Close</button>
        </div>
      </div>
      <div class="modal-backdrop" @click="closeChat()"></div>
    </div>

    <!-- Envelope log (debugging / proof of sync) -->
    <div class="mt-6" x-show="showLog">
      <h2 class="text-sm font-semibold mb-2">Envelope log</h2>
      <ul class="bg-base-100 rounded-box p-2 max-h-72 overflow-y-auto text-xs font-mono">
        <template x-for="(entry, i) in logEntries" :key="i">
          <li class="border-b border-base-200 py-1">
            <span class="text-base-content/50" x-text="entry.ts + ' — ' + entry.label"></span>
            <code class="block break-all" x-text="entry.body"></code>
          </li>
        </template>
      </ul>
    </div>
  </div>

  <!-- AlpineJS must load after the component definition is registered. We
       register the factory on alpine:init, then load Alpine. -->
  <script>
    const dashboardId = "{{DASHBOARD_ID}}";

    function boardFactory() {
      return {
        dashboardId,
        // Local view document; the single source of truth for rendering, kept
        // in sync by replaying the authoritative RFC6902 patch stream.
        doc: { id: dashboardId, name: "", variables: [], bricks: [] },
        // brickId -> server-rendered HTML/SVG fragment (from `rendered` topic).
        fragments: {},
        // brickId -> {code, message} when the server failed to render the brick.
        // A typed render error (e.g. a bad hand-edited template) is shown against
        // the brick instead of crashing the board; cleared on the next good render.
        renderErrors: {},
        // Template editor state. brickId/kind target the brick being edited;
        // pulse/prism hold the two JSON textareas for pulse_prism; text holds the
        // plain-text body for every other kind; errors.* are inline JSON.parse
        // messages; serverError is the typed render error echoed back after save.
        editor: {
          open: false,
          brickId: "",
          kind: "",
          pulse: "",
          prism: "",
          text: "",
          errors: { pulse: "", prism: "" },
          serverError: null,
        },
        // Per-brick AI build chat. `chats` keeps a DISTINCT conversation per
        // brick_id ({ messages: [...], pending: bool }) so each brick's panel
        // shows only its own history. `chat` is the open-panel UI state: which
        // brick the modal targets and the current composer draft.
        chats: {},
        chat: { open: false, brickId: "", draft: "" },
        cols: 12,
        viewers: 0,
        status: "connecting",
        showLog: false,
        // Variables panel UI. showVars toggles the panel; newVar holds the
        // add-a-definition form (options is a comma-separated string the UI
        // splits into a list; error surfaces a rejected define_variable intent).
        showVars: false,
        newVar: { name: "", type: "string", default: "", options: "", error: "" },
        logEntries: [],
        centrifuge: null,
        sub: null,

        get statusClass() {
          if (this.status === "connected") return "badge-success";
          if (this.status === "error") return "badge-error";
          return "badge-ghost";
        },

        log(label, data) {
          this.logEntries.unshift({
            ts: new Date().toISOString(),
            label,
            body: JSON.stringify(data),
          });
          if (this.logEntries.length > 100) this.logEntries.pop();
        },

        async init() {
          // 1. Load the initial authoritative document snapshot over HTTP.
          await this.loadDoc();
          // 2. Connect to the realtime channel and replay the live stream.
          await this.connect();
        },

        async loadDoc() {
          try {
            const res = await fetch(`/dashboards/${this.dashboardId}/doc`);
            if (!res.ok) throw new Error("doc fetch failed: " + res.status);
            const body = await res.json();
            this.doc = normalizeDoc(body);
          } catch (e) {
            this.log("doc load error", { message: e.message });
          }
        },

        // mintToken asks the server for a short-lived JWT scoped to this
        // dashboard. centrifuge-js re-invokes it on reconnect so tokens refresh
        // transparently after expiry or a dropped connection.
        async mintToken() {
          const res = await fetch(`/dashboards/${this.dashboardId}/token`, { method: "POST" });
          if (!res.ok) throw new Error("token mint failed: " + res.status);
          return res.json();
        },

        async connect() {
          const first = await this.mintToken();
          const channel = first.channel;
          const c = new Centrifuge("ws://" + location.host + "/connection/websocket");
          this.centrifuge = c;

          c.on("connected", () => { this.status = "connected"; this.log("connected", { channel }); });
          c.on("connecting", (ctx) => { this.status = "connecting"; this.log("connecting", { code: ctx.code }); });
          c.on("disconnected", (ctx) => { this.status = "error"; this.log("disconnected", { reason: ctx.reason }); });
          c.on("error", (ctx) => { this.status = "error"; this.log("error", { message: ctx.error && ctx.error.message }); });

          const sub = c.newSubscription(channel, {
            getToken: async () => (await this.mintToken()).token,
            token: first.token,
          });
          this.sub = sub;

          sub.on("publication", (ctx) => this.onEnvelope(ctx.data || {}));
          sub.on("subscribed", () => this.log("subscribed", { channel }));
          sub.on("error", (ctx) => this.log("sub error", { message: ctx.error && ctx.error.message }));

          sub.subscribe();
          c.connect();
        },

        // onEnvelope dispatches one server envelope by topic.
        onEnvelope(env) {
          this.log("publication[" + (env.topic || "?") + "]", env);
          switch (env.topic) {
            case "patches":
              this.applyPatch(env.data);
              break;
            case "rendered":
              this.applyRendered(env.data);
              break;
            case "presence":
              if (env.data && typeof env.data.viewers === "number") this.viewers = env.data.viewers;
              break;
          }
        },

        // applyPatch replays an RFC6902 patch onto the local view document.
        applyPatch(patch) {
          if (!patch) return;
          try {
            const result = jsonpatch.applyPatch(
              normalizeDoc(this.doc),
              patch,
              /* validate */ false,
              /* mutate */ false,
            );
            this.doc = normalizeDoc(result.newDocument);
            // Drop fragments + render errors for bricks that no longer exist.
            const ids = new Set(this.doc.bricks.map((b) => b.id));
            for (const id of Object.keys(this.fragments)) {
              if (!ids.has(id)) delete this.fragments[id];
            }
            for (const id of Object.keys(this.renderErrors)) {
              if (!ids.has(id)) delete this.renderErrors[id];
            }
          } catch (e) {
            this.log("patch apply error", { message: e.message, patch });
          }
        },

        // applyRendered handles a `rendered` envelope for a brick. On success it
        // slots the {brick_id, html} fragment verbatim and clears any prior error.
        // On failure the envelope carries {brick_id, code, error}: the brick's
        // last good fragment is kept, the typed error is shown against the brick,
        // and — if the editor is open on that brick — surfaced inline in the panel.
        applyRendered(data) {
          if (!data || !data.brick_id) return;
          if (data.error) {
            const err = { code: data.code || "", message: data.error };
            this.renderErrors[data.brick_id] = err;
            if (this.editor.open && this.editor.brickId === data.brick_id) {
              this.editor.serverError = err;
            }
            return;
          }
          delete this.renderErrors[data.brick_id];
          if (this.editor.open && this.editor.brickId === data.brick_id) {
            this.editor.serverError = null;
          }
          this.fragments[data.brick_id] = data.html != null ? data.html : "";
        },

        placeholder(brick) {
          return `<div class="text-base-content/40 text-sm italic flex items-center justify-center h-full">`
            + `awaiting rendered ${escapeHtml(brick.kind)} fragment…</div>`;
        },

        // --- intent emission (client→server over centrifuge RPC) -------------

        // sendIntent submits an intent over RPC and resolves to {ok, code, message}.
        // The RPC reply is the only place the server reports that an intent itself
        // was rejected (e.g. unknown brick), so we capture centrifuge's error reply
        // (code + message) rather than swallowing it. Note: a render failure is NOT
        // an intent failure — edit_template succeeds, and a bad template comes back
        // later on the `rendered` topic (see applyRendered).
        async sendIntent(intent) {
          if (!this.centrifuge) return { ok: false, message: "not connected" };
          try {
            await this.centrifuge.rpc("intent", {
              dashboard_id: this.dashboardId,
              intent,
            });
            // The applied patch is broadcast on the `patches` topic, so the
            // local view updates from the authoritative stream — not here.
            return { ok: true };
          } catch (e) {
            const code = e && e.code != null ? String(e.code) : "";
            const message = (e && e.message) || "intent rejected";
            this.log("intent error", { intent: intent.type, code, message });
            return { ok: false, code, message };
          }
        },

        // addBrick creates a brick of the given kind, seeded with a small WORKING
        // example template so the first render is not blank. The kind selects both
        // the seed template and (later) which editor the panel shows.
        addBrick(kind) {
          kind = kind || "markdown";
          const id = "brick-" + Math.random().toString(36).slice(2, 10);
          // New bricks land below the current bottom row (column-flow masonry).
          const maxY = this.doc.bricks.reduce((m, b) => Math.max(m, (b.layout.pos.y || 0)), 0);
          const size = kind === "pulse_prism"
            ? { width: 6, height: 8 }
            : { width: 4, height: 4 };
          const brick = {
            id,
            kind,
            layout: { pos: { x: 0, y: maxY + 1 }, size },
            template: exampleTemplate(kind),
            // Seed an agent_id so the brick's AI build panel (brick_chat) has an
            // engine to drive. agent_id is an opaque per-agent partition key
            // server-side; the hub lazily boots one Nexus engine per id. v1
            // gives each brick its own agent (id == brick id).
            agent_id: id,
          };
          this.sendIntent({ type: "add_brick", brick_id: id, brick });
        },

        deleteBrick(brick) {
          this.sendIntent({ type: "delete_brick", brick_id: brick.id });
        },

        // moveBrick nudges a brick's grid position. v1 masonry uses pos.y for
        // ordering; pos.x is advisory. dy/dx are grid-cell deltas.
        moveBrick(brick, dx, dy) {
          const pos = {
            x: clampMin(brick.layout.pos.x + dx, 0),
            y: clampMin(brick.layout.pos.y + dy, 0),
          };
          this.sendIntent({ type: "move_brick", brick_id: brick.id, pos });
        },

        resizeBrick(brick, dw, dh) {
          const size = {
            width: clamp(brick.layout.size.width + dw, 1, this.cols),
            height: clampMin(brick.layout.size.height + dh, 1),
          };
          this.sendIntent({ type: "resize_brick", brick_id: brick.id, size });
        },

        // --- variables -------------------------------------------------------

        // addVariable emits a define_variable intent from the new-variable form.
        // It does minimal client-side validation that mirrors the server (name
        // required; number default parses; enum needs options and an in-list
        // default) and clears the form on a successful intent. The server is
        // authoritative — a rejected intent's message lands in newVar.error.
        async addVariable() {
          const nv = this.newVar;
          nv.error = "";
          const name = (nv.name || "").trim();
          if (!name) { nv.error = "name is required"; return; }
          if (this.doc.variables.some((v) => v.name === name)) {
            nv.error = "a variable named " + name + " already exists";
            return;
          }
          const options = nv.type === "enum"
            ? nv.options.split(",").map((s) => s.trim()).filter((s) => s !== "")
            : [];
          if (nv.type === "enum" && options.length === 0) {
            nv.error = "enum needs at least one option";
            return;
          }
          const def = (nv.default || "").trim();
          if (nv.type === "number" && def !== "" && Number.isNaN(Number(def))) {
            nv.error = "default must be a number";
            return;
          }
          if (nv.type === "enum" && def !== "" && !options.includes(def)) {
            nv.error = "default must be one of the options";
            return;
          }
          const res = await this.sendIntent({
            type: "define_variable",
            name,
            var_type: nv.type,
            default: def,
            value: def,
            options,
          });
          if (!res.ok) { nv.error = res.message || "rejected"; return; }
          // The authoritative patch adds it to doc.variables; reset the form.
          this.newVar = { name: "", type: "string", default: "", options: "", error: "" };
        },

        // setVariable emits a set_variable intent for an existing variable's
        // current value. The authoritative patch reflects it for every browser.
        setVariable(name, value) {
          this.sendIntent({ type: "set_variable", name, value: String(value) });
        },

        removeVariable(name) {
          this.sendIntent({ type: "remove_variable", name });
        },

        // --- template editor -------------------------------------------------

        // openEditor loads a brick's template into the editor. For pulse_prism it
        // splits the template JSON into its pulse_request / prism_spec halves and
        // pretty-prints each into its own textarea; any other kind edits the raw
        // template as plain text. A render error already known for the brick is
        // pre-loaded so the panel shows why the last save did not render.
        openEditor(brick) {
          const ed = this.editor;
          ed.brickId = brick.id;
          ed.kind = brick.kind;
          ed.errors = { pulse: "", prism: "" };
          ed.serverError = this.renderErrors[brick.id] || null;
          if (brick.kind === "pulse_prism") {
            let tmpl = {};
            try { tmpl = JSON.parse(brick.template || "{}") || {}; } catch (e) { tmpl = {}; }
            ed.pulse = prettyJSON(tmpl.pulse_request);
            ed.prism = prettyJSON(tmpl.prism_spec);
            ed.text = "";
          } else {
            ed.text = brick.template || "";
            ed.pulse = "";
            ed.prism = "";
          }
          ed.open = true;
          this.validateEditor();
        },

        closeEditor() {
          this.editor.open = false;
        },

        // validateEditor runs client-side JSON.parse on the pulse_prism textareas
        // and records inline parse errors. Plain-text kinds have nothing to parse.
        validateEditor() {
          const ed = this.editor;
          if (ed.kind !== "pulse_prism") {
            ed.errors = { pulse: "", prism: "" };
            return;
          }
          ed.errors = {
            pulse: jsonError(ed.pulse),
            prism: jsonError(ed.prism),
          };
        },

        // editorValid reports whether Save should be enabled: pulse_prism needs
        // both textareas to parse as JSON; other kinds are always saveable.
        editorValid() {
          if (this.editor.kind !== "pulse_prism") return true;
          return !this.editor.errors.pulse && !this.editor.errors.prism;
        },

        // saveEditor assembles the new template and emits the edit_template intent.
        // For pulse_prism it re-wraps the two halves into the {pulse_request,
        // prism_spec} envelope the renderer expects. It does NOT close on a render
        // failure: the server re-renders after the intent acks and a bad template
        // comes back on the `rendered` topic, shown inline via editor.serverError.
        async saveEditor() {
          this.validateEditor();
          if (!this.editorValid()) return;
          const ed = this.editor;
          let template;
          if (ed.kind === "pulse_prism") {
            template = JSON.stringify({
              pulse_request: JSON.parse(ed.pulse),
              prism_spec: JSON.parse(ed.prism),
            });
          } else {
            template = ed.text;
          }
          ed.serverError = null;
          const res = await this.sendIntent({
            type: "edit_template",
            brick_id: ed.brickId,
            template,
          });
          if (!res.ok) {
            // The intent itself was rejected (e.g. brick gone). Surface it inline
            // and keep the panel open so the edit is not lost.
            ed.serverError = { code: res.code || "", message: res.message };
            return;
          }
          // Intent accepted. Close the editor; the chart (or a typed render error)
          // arrives on the `rendered` topic and updates the brick for both browsers.
          this.closeEditor();
        },

        // --- AI build chat (per brick) ---------------------------------------

        // chatFor returns the conversation record for a brick id, creating an
        // empty one on first use so each brick keeps its own history.
        chatFor(brickId) {
          if (!this.chats[brickId]) {
            this.chats[brickId] = { messages: [], pending: false };
          }
          return this.chats[brickId];
        },

        // openChat opens the AI build panel scoped to one brick. A brick with no
        // agent_id cannot be driven (the server resolves the agent from the
        // brick), so seed a system note explaining that rather than letting the
        // first send fail opaquely.
        openChat(brick) {
          this.chat.brickId = brick.id;
          this.chat.draft = "";
          this.chat.open = true;
          const c = this.chatFor(brick.id);
          if (!brick.agent_id && c.messages.length === 0) {
            c.messages.push({
              role: "system",
              text: "This brick has no agent yet, so AI build is unavailable. "
                + "Re-create the brick (new bricks get an agent) or edit the template by hand.",
            });
          }
          this.$nextTick(() => this.scrollChat());
        },

        closeChat() {
          this.chat.open = false;
        },

        // chatBrickKind / chatMessages / chatPending read the open panel's brick
        // and its conversation. They tolerate a brick that was deleted while the
        // panel was open (returns empty) so the board never crashes.
        chatBrickKind() {
          const b = this.doc.bricks.find((x) => x.id === this.chat.brickId);
          return b ? b.kind : "";
        },
        chatMessages() {
          const c = this.chats[this.chat.brickId];
          return c ? c.messages : [];
        },
        chatPending() {
          const c = this.chats[this.chat.brickId];
          return !!(c && c.pending);
        },

        scrollChat() {
          const el = this.$refs.chatLog;
          if (el) el.scrollTop = el.scrollHeight;
        },

        // sendChat routes the composer text to the brick's agent over the
        // brick_chat RPC (E4-S2). The server drives the agent, applies the
        // emitted template as edit_template, and replies with the applied patch +
        // canonical template; the chart itself updates for every browser via the
        // `rendered` topic (applyRendered), NOT here. The server surfaces only a
        // final reply (no token/tool-call stream), so the UI shows one generic
        // "working…" state, then the built-template confirmation or a typed
        // error. The conversation is scoped to chat.brickId.
        async sendChat() {
          const brickId = this.chat.brickId;
          const text = this.chat.draft.trim();
          if (!text || !brickId) return;
          const c = this.chatFor(brickId);
          if (c.pending) return;

          c.messages.push({ role: "user", text });
          this.chat.draft = "";
          c.pending = true;
          this.$nextTick(() => this.scrollChat());

          const res = await this.brickChat(brickId, text);
          c.pending = false;

          if (res.ok) {
            c.messages.push({
              role: "agent",
              text: "Built this brick. The chart has been updated.",
              template: res.template ? prettyTemplate(res.template) : "",
              show: false,
            });
          } else {
            c.messages.push({
              role: "error",
              text: (res.code ? res.code + ": " : "") + (res.message || "the agent failed"),
            });
          }
          this.$nextTick(() => this.scrollChat());
        },

        // brickChat performs the brick_chat RPC and resolves to
        // {ok, template?, code?, message?}. A rejection (unknown brick, no
        // agent_id, agent failure, bad template) comes back as a centrifuge error
        // reply; we capture its code + message so the panel can show it without
        // crashing the board.
        async brickChat(brickId, message) {
          if (!this.centrifuge) return { ok: false, message: "not connected" };
          try {
            const reply = await this.centrifuge.rpc("brick_chat", {
              dashboard_id: this.dashboardId,
              brick_id: brickId,
              message,
            });
            const data = (reply && reply.data) || {};
            return { ok: true, template: data.template || "" };
          } catch (e) {
            const code = e && e.code != null ? String(e.code) : "";
            const message = (e && e.message) || "brick_chat rejected";
            this.log("brick_chat error", { brickId, code, message });
            return { ok: false, code, message };
          }
        },

        // --- layout / rendering helpers --------------------------------------

        // orderedBricks sorts by (pos.y, pos.x) so column-flow masonry order is
        // stable and driven by the authoritative layout.
        orderedBricks() {
          return [...this.doc.bricks].sort((a, b) => {
            const ay = a.layout.pos.y, by = b.layout.pos.y;
            if (ay !== by) return ay - by;
            return a.layout.pos.x - b.layout.pos.x;
          });
        },

        brickStyle(brick) {
          const w = clamp(brick.layout.size.width, 1, this.cols);
          const h = clampMin(brick.layout.size.height, 1);
          return `grid-column: span ${w}; grid-row: span ${h};`;
        },
      };
    }

    // normalizeDoc coerces a raw doc into the shape the view expects, filling
    // missing layout fields so the grid math never sees undefined.
    function normalizeDoc(raw) {
      const d = raw || {};
      const bricks = Array.isArray(d.bricks) ? d.bricks : [];
      return {
        id: d.id || dashboardId,
        name: d.name || "",
        variables: Array.isArray(d.variables) ? d.variables : [],
        bricks: bricks.map((b) => ({
          id: b.id,
          kind: b.kind || "markdown",
          template: b.template || "",
          agent_id: b.agent_id || "",
          layout: {
            pos: { x: (b.layout && b.layout.pos && b.layout.pos.x) || 0, y: (b.layout && b.layout.pos && b.layout.pos.y) || 0 },
            size: {
              width: (b.layout && b.layout.size && b.layout.size.width) || 4,
              height: (b.layout && b.layout.size && b.layout.size.height) || 4,
            },
          },
        })),
      };
    }

    // exampleTemplate returns a small WORKING seed template for a new brick of
    // the given kind, so the first render is meaningful rather than blank. The
    // pulse_prism example mirrors render/pulseprism_*_test.go: it sums `amount`
    // by `region` (labelled `amount`, so the column is `amount` not
    // AGG_SUM_amount) and plots it as a bar chart. Users edit it via the panel.
    function exampleTemplate(kind) {
      if (kind === "pulse_prism") {
        return JSON.stringify({
          pulse_request: {
            cohort: { filename: "sales.pulse" },
            groups: [{ type: "GROUP_CATEGORY", field: "region" }],
            aggregations: [{ type: "AGG_SUM", field: "amount", label: "amount" }],
          },
          prism_spec: {
            mark: "bar",
            encoding: {
              x: { field: "region", type: "nominal" },
              y: { field: "amount", type: "quantitative" },
            },
          },
        });
      }
      return "# New brick\n\nEdit this markdown.";
    }

    // prettyJSON renders a value as indented JSON for a textarea, tolerating
    // undefined (a missing template half) by showing an empty object.
    function prettyJSON(v) {
      try { return JSON.stringify(v === undefined ? {} : v, null, 2); } catch (e) { return ""; }
    }

    // prettyTemplate pretty-prints the canonical (compact) template string the
    // brick_chat reply carries, for display in a chat bubble. Falls back to the
    // raw string if it is not JSON.
    function prettyTemplate(s) {
      try { return JSON.stringify(JSON.parse(s), null, 2); } catch (e) { return s; }
    }

    // jsonError returns a human-readable parse error for s, or "" if it is valid
    // JSON. Used for inline editor validation feedback.
    function jsonError(s) {
      try { JSON.parse(s); return ""; } catch (e) { return e.message; }
    }

    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
    function clampMin(n, lo) { return Math.max(lo, n); }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    document.addEventListener("alpine:init", () => {
      Alpine.data("board", boardFactory);
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
