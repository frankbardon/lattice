[book]
authors = ["Frank Bardon"]
language = "en"
src = "src"
title = "Lattice Dashboard Spec"
description = "The JSON dashboard document format and schema catalog resolved by the lattice tool"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/frankbardon/lattice"
edit-url-template = "https://github.com/frankbardon/lattice/edit/main/docs/src/{path}"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
boost-hierarchy = 2
